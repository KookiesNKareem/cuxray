name: "cuxray gate"
description: "Gate CUDA kernel resource regressions (registers, spills, occupancy, bank conflicts) — no GPU needed"
branding:
  icon: "zap"
  color: "green"

inputs:
  path:
    description: "Artifact to analyze: .cubin, host ELF (.so/.o), or directory"
    required: true
  gate:
    description: 'Gate expression, e.g. "spill_instrs==0, regs<=168, bank_ways<=2"'
    required: true
  threads:
    description: "Block shape ('256' or '32,8') — needed for occupancy/bank metrics unless the binary carries launch metadata"
    required: false
    default: ""
  kernel:
    description: "Regex filter on kernel names"
    required: false
    default: ""
  version:
    description: "PyPI version to install instead of the action's own source (default: install the checked-out action source, so uses: ...@vX runs exactly vX)"
    required: false
    default: ""
  source-root:
    description: "Strip this prefix from source paths in SARIF (for repo-relative annotations)"
    required: false
    default: ""
  sarif:
    description: "Write SARIF to this path (upload with github/codeql-action/upload-sarif for PR annotations)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install cuxray
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "cuxray==${{ inputs.version }}"
        else
          pip install "$GITHUB_ACTION_PATH"
        fi
    - name: Run gate
      shell: bash
      run: |
        ARGS=()
        [ -n "${{ inputs.threads }}" ] && ARGS+=(--threads "${{ inputs.threads }}")
        [ -n "${{ inputs.kernel }}" ] && ARGS+=(--kernel "${{ inputs.kernel }}")
        [ -n "${{ inputs.sarif }}" ] && ARGS+=(--sarif "${{ inputs.sarif }}")
        [ -n "${{ inputs.source-root }}" ] && ARGS+=(--source-root "${{ inputs.source-root }}")
        cuxray gate "${{ inputs.path }}" "${{ inputs.gate }}" "${ARGS[@]}"
